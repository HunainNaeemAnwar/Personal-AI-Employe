openapi: 3.1.0
info:
  title: Email Sender MCP Server
  description: |
    MCP server for sending emails via Gmail API. Provides email composition,
    threading, and delivery capabilities for the Personal AI Employee system.

    This server implements the Model Context Protocol (MCP) specification and
    integrates with Claude Code for AI-driven email automation.
  version: 1.0.0
  contact:
    name: Personal AI Employee
    url: https://github.com/HunainNaeemAnwar/Personal-AI-Employe

servers:
  - url: stdio://
    description: Local stdio transport (default for Claude Code integration)

paths:
  /tools/send_email:
    post:
      summary: Send email via Gmail API
      description: |
        Sends an email using Gmail API with support for threading, attachments,
        and retry logic. Requires prior user approval for sensitive communications.
      operationId: sendEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
            examples:
              simple_email:
                summary: Simple email without threading
                value:
                  recipients:
                    - client@example.com
                  subject: "Project Proposal Follow-up"
                  body: "Thank you for your interest in our AI automation services..."

              reply_email:
                summary: Reply to existing thread
                value:
                  recipients:
                    - client@example.com
                  subject: "Re: Project Proposal"
                  body: "Following up on our previous discussion..."
                  thread_id: "18d4f2a3b5c6e7f8"
                  in_reply_to: "<CABcD1234@mail.gmail.com>"

              email_with_attachments:
                summary: Email with attachments
                value:
                  recipients:
                    - client@example.com
                  cc:
                    - team@example.com
                  subject: "Project Timeline and Pricing"
                  body: "Please find attached the project timeline and pricing breakdown."
                  attachment_paths:
                    - "/home/hunain/Documents/project_timeline.pdf"
                    - "/home/hunain/Documents/pricing.xlsx"

      responses:
        '200':
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailResponse'
              examples:
                success:
                  value:
                    success: true
                    message_id: "18d4f2a3b5c6e7f9"
                    thread_id: "18d4f2a3b5c6e7f8"
                    sent_at: "2026-03-09T15:00:05Z"

        '400':
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_email:
                  value:
                    error: "Invalid email address format: invalid@"
                    code: "VALIDATION_ERROR"

        '401':
          description: Authentication failed (invalid Gmail credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                auth_failed:
                  value:
                    error: "Gmail API authentication failed. Please refresh OAuth2 token."
                    code: "AUTH_ERROR"

        '429':
          description: Rate limit exceeded (Gmail API quota)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rate_limit:
                  value:
                    error: "Gmail API rate limit exceeded. Retry after 3600 seconds."
                    code: "RATE_LIMIT_ERROR"
                    retry_after: 3600

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                server_error:
                  value:
                    error: "Failed to send email: Network timeout"
                    code: "INTERNAL_ERROR"

components:
  schemas:
    SendEmailRequest:
      type: object
      required:
        - recipients
        - subject
        - body
      properties:
        recipients:
          type: array
          description: List of recipient email addresses (To field)
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: email
          example:
            - client@example.com
            - partner@example.com

        cc:
          type: array
          description: List of CC recipient email addresses
          maxItems: 50
          items:
            type: string
            format: email
          example:
            - team@example.com

        bcc:
          type: array
          description: List of BCC recipient email addresses
          maxItems: 50
          items:
            type: string
            format: email
          example:
            - archive@example.com

        subject:
          type: string
          description: Email subject line
          minLength: 1
          maxLength: 998
          example: "Re: Project Proposal"

        body:
          type: string
          description: Email body (plain text or HTML)
          minLength: 1
          maxLength: 1000000
          example: "Thank you for your inquiry..."

        thread_id:
          type: string
          description: Gmail thread ID for replies (preserves conversation threading)
          pattern: '^[0-9a-f]{16}$'
          example: "18d4f2a3b5c6e7f8"

        in_reply_to:
          type: string
          description: Message-ID header for proper threading (RFC 5322)
          pattern: '^<.+@.+>$'
          example: "<CABcD1234@mail.gmail.com>"

        attachment_paths:
          type: array
          description: Absolute paths to attachment files
          maxItems: 10
          items:
            type: string
            format: path
          example:
            - "/home/hunain/Documents/proposal.pdf"

        retry_count:
          type: integer
          description: Current retry attempt (internal use)
          minimum: 0
          maximum: 3
          default: 0

    SendEmailResponse:
      type: object
      required:
        - success
        - message_id
        - sent_at
      properties:
        success:
          type: boolean
          description: Whether email was sent successfully
          example: true

        message_id:
          type: string
          description: Gmail message ID of sent email
          pattern: '^[0-9a-f]{16}$'
          example: "18d4f2a3b5c6e7f9"

        thread_id:
          type: string
          description: Gmail thread ID (same as request if replying, new if starting thread)
          pattern: '^[0-9a-f]{16}$'
          example: "18d4f2a3b5c6e7f8"

        sent_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when email was sent
          example: "2026-03-09T15:00:05Z"

        retry_count:
          type: integer
          description: Number of retry attempts made
          minimum: 0
          maximum: 3
          example: 0

    ErrorResponse:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "Invalid email address format"

        code:
          type: string
          description: Machine-readable error code
          enum:
            - VALIDATION_ERROR
            - AUTH_ERROR
            - RATE_LIMIT_ERROR
            - NETWORK_ERROR
            - INTERNAL_ERROR
          example: "VALIDATION_ERROR"

        retry_after:
          type: integer
          description: Seconds to wait before retrying (for rate limit errors)
          minimum: 0
          example: 3600

        details:
          type: object
          description: Additional error context
          additionalProperties: true
          example:
            field: "recipients[0]"
            value: "invalid@"

  securitySchemes:
    OAuth2:
      type: oauth2
      description: Gmail API OAuth2 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/gmail.send: Send emails on behalf of user
            https://www.googleapis.com/auth/gmail.compose: Create and send drafts

security:
  - OAuth2:
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/gmail.compose

tags:
  - name: Email Operations
    description: Email sending and management operations

externalDocs:
  description: Gmail API Documentation
  url: https://developers.google.com/gmail/api
